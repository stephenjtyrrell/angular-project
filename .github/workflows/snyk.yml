name: Snyk Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Runs at 03:00 UTC every Monday
    - cron: "0 3 * * 1"

jobs:
  # ── Job 1: Scan third-party package/dependency vulnerabilities ──────────────
  snyk-dependencies:
    name: Snyk – Dependency Vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Snyk – test open-source dependencies
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # 'test' scans package.json / package-lock.json for known CVEs
          command: test
          args: --all-projects --severity-threshold=high --sarif-file-output=snyk-deps.sarif

      - name: Upload dependency scan results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

  # ── Job 2: SAST – scan first-party source code for security issues ──────────
  snyk-code:
    name: Snyk – Source Code SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Snyk – test source code (SAST)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # 'code test' performs static analysis of your TypeScript source
          command: code test
          args: --severity-threshold=high --sarif-file-output=snyk-code.sarif

      - name: Upload SAST results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

  # ── Job 3: npm audit – lightweight built-in dependency check (no token) ─────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high and critical)
        run: npm audit --audit-level=high

      # Explicit version-pinning check for CVEs that are not yet indexed in
      # npm/GitHub advisory databases. Add entries here as new CVEs are
      # disclosed but before the advisory DBs catch up.
      - name: Check unindexed CVE mitigations
        run: |
          node - <<'EOF'
          const { execSync } = require('child_process');
          const tree = JSON.parse(execSync('npm ls --all --json 2>/dev/null').toString());

          // List of packages whose installed version MUST be >= a minimum safe version.
          // Format: { pkg, minSafe, cve, reason }
          const checks = [
            {
              pkg: 'pacote',
              minSafe: '21.5.1',
              cve: 'CVE-2026-9496',
              reason: 'DoS via addGitSha regex (CVSS 7.7 HIGH) – awaiting NVD indexing'
            },
          ];

          function findVersions(node, name, found = []) {
            if (!node || !node.dependencies) return found;
            if (node.dependencies[name]) {
              found.push(node.dependencies[name].version);
              findVersions(node.dependencies[name], name, found);
            }
            for (const dep of Object.values(node.dependencies)) {
              findVersions(dep, name, found);
            }
            return found;
          }

          function semverLt(a, b) {
            const pa = a.split('.').map(Number);
            const pb = b.split('.').map(Number);
            for (let i = 0; i < 3; i++) {
              if ((pa[i] || 0) < (pb[i] || 0)) return true;
              if ((pa[i] || 0) > (pb[i] || 0)) return false;
            }
            return false;
          }

          let failed = false;
          for (const { pkg, minSafe, cve, reason } of checks) {
            const versions = findVersions(tree, pkg);
            if (versions.length === 0) continue; // package not installed, skip
            for (const v of versions) {
              if (semverLt(v, minSafe)) {
                console.error(`\u274C ${cve}: ${pkg}@${v} is vulnerable. Minimum safe version: ${minSafe}`);
                console.error(`   Reason: ${reason}`);
                failed = true;
              } else {
                console.log(`\u2714  ${cve}: ${pkg}@${v} meets minimum safe version (>= ${minSafe})`);
              }
            }
          }

          if (failed) process.exit(1);
          EOF
